<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TEMI</title>
  <style>
    :root {
      --bg: #ffffff;
      --panel: #ffffff;
      --panel-soft: #f7f7f8;
      --line: #e9e9ec;
      --text: #151515;
      --muted: #6b7280;
      --primary: #12b7ad;
      --primary-soft: #f3f4f6;
      --user: #f5f5f5;
      --assistant: #ffffff;
      --shadow: 0 10px 35px rgba(15, 23, 42, 0.06);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100%;
    }

    body {
      display: flex;
      min-height: 100vh;
      overflow: hidden;
    }

    .text-primary {
      color: #12b7ad !important;
    }

    .app {
      display: grid;
      grid-template-columns: 280px 1fr;
      width: 100%;
      min-height: 100vh;
      background: var(--bg);
    }

    .sidebar {
      background: #fbfbfb;
      border-right: 1px solid var(--line);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 18px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .brand-icon {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: var(--primary);
      color: white;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.04em;
    }

    .brand h1 {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
    }

    .brand p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .new-chat,
    .ghost-btn,
    .send-btn,
    .copy-btn {
      border: none;
      cursor: pointer;
      transition: 0.2s ease;
      font: inherit;
    }

    .new-chat {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      background: var(--primary);
      color: white;
      font-weight: 600;
    }

    .new-chat:hover,
    .send-btn:hover,
    .copy-btn:hover {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    .section-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 6px 4px 0;
    }

    .history {
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: auto;
      padding-right: 4px;
    }

    .history-item {
      display: flex;
      align-items: stretch;
      gap: 8px;
      padding: 8px;
      border-radius: 14px;
      border: 1px solid transparent;
      background: transparent;
    }

    .history-item:hover,
    .history-item.active {
      background: var(--panel-soft);
      border-color: var(--line);
    }

    .history-item-main {
      flex: 1;
      min-width: 0;
      padding: 4px 6px;
      border: none;
      background: transparent;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      font: inherit;
    }

    .history-item strong {
      display: block;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-item span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-delete {
      width: 36px;
      height: 36px;
      align-self: center;
      border: 1px solid transparent;
      border-radius: 10px;
      background: transparent;
      color: #9ca3af;
      cursor: pointer;
      font-size: 16px;
      flex-shrink: 0;
    }

    .history-delete:hover {
      background: #fff1f2;
      border-color: #fecdd3;
      color: #e11d48;
    }

    .history-empty {
      padding: 12px 14px;
      cursor: default;
    }

    .history-empty strong,
    .history-empty span {
      cursor: default;
    }

    .sidebar-footer {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-top: 8px;
    }

    .ghost-btn {
      padding: 13px 14px;
      border-radius: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      text-align: left;
      color: var(--text);
      font-weight: 500;
      cursor: default;
    }

    .main {
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 100vh;
      background: linear-gradient(to bottom, #ffffff 0%, #fcfcfd 100%);
    }

    .topbar {
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
      gap: 12px;
    }

    .topbar h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }

    .topbar p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .status-pill {
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--panel);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      max-width: 44vw;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-scroll {
      flex: 1;
      overflow: auto;
      padding: 28px 20px 24px;
      scroll-behavior: smooth;
    }

    .chat-wrap {
      width: min(920px, 100%);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .welcome {
      padding: 6px 0 18px;
    }

    .welcome-hero {
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      gap: 18px;
    }

    .welcome-copy {
      flex: 0 1 auto;
      min-width: 0;
      max-width: min(100%, 680px);
    }

    .welcome-bubble {
      position: relative;
      display: inline-flex;
      width: fit-content;
      max-width: 100%;
      padding: 18px 22px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: #ffffff;
      box-shadow: var(--shadow);
    }

    .welcome h3 {
      margin: 0;
      font-size: 25px;
      line-height: 1.1;
      white-space: normal;
    }

    .welcome-gif {
      width: clamp(50px, 8vw, 80px);
      height: auto;
      flex-shrink: 0;
      object-fit: contain;
    }

    .welcome p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
      max-width: 680px;
    }

    .message-row {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .assistant-row {
      justify-content: flex-start;
      gap: 0;
    }

    .user-row {
      justify-content: flex-end;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      font-size: 13px;
      font-weight: 700;
      border: 1px solid var(--line);
      background: var(--panel);
    }

    .bubble {
      min-width: 0;
    }

    .bubble.user {
      flex: 0 1 auto;
      width: fit-content;
      max-width: 70%;
      padding: 16px 18px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: var(--user);
      box-shadow: var(--shadow);
    }

    .bubble.assistant {
      flex: 1;
      max-width: 100%;
      padding: 0;
      border: none;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    .bubble .name {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .bubble .text {
      font-size: 15px;
      line-height: 1.75;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble.assistant .text {
      white-space: normal;
    }

    .bubble .actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 12px;
    }

    .assistant-row .bubble .actions {
      justify-content: flex-start;
      margin-top: 16px;
    }

    .copy-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      border-radius: 12px;
      padding: 8px 10px;
      font-size: 12px;
    }

    .bubble pre {
      background: #f8f8f9;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      overflow-x: auto;
      white-space: pre;
      font-size: 13px;
      line-height: 1.65;
      margin: 0 0 12px;
    }

    .assistant-row .bubble pre {
      background: #fbfbfc;
    }

    .chart-preview {
      margin: 18px 0 10px;
      padding: 18px 18px 12px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: linear-gradient(180deg, #ffffff 0%, #fbfcfe 100%);
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.05);
    }

    .chart-preview-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .chart-preview-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .chart-preview-kind {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(18, 183, 173, 0.1);
      color: var(--primary);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .chart-preview-canvas {
      position: relative;
      width: 100%;
      min-height: 320px;
    }

    .chart-preview-canvas canvas {
      width: 100% !important;
      height: 320px !important;
      display: block;
    }

    .bubble code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.95em;
    }

    .bubble p {
      margin: 0 0 12px;
    }

    .bubble p:last-child {
      margin-bottom: 0;
    }

    .bubble ul,
    .bubble ol {
      margin: 0 0 12px 20px;
      padding: 0;
    }

    .bubble li {
      margin: 4px 0;
    }

    .bubble strong {
      font-weight: 700;
    }

    .bubble a {
      color: var(--text);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      margin: 0;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      -webkit-overflow-scrolling: touch;
      margin-bottom: 10px;
    }

    .table-wrap table {
      width: 100%;
      min-width: 560px;
      border-collapse: collapse;
      font-size: 14px;
      line-height: 1.6;
    }

    .table-wrap th,
    .table-wrap td {
      padding: 12px 14px;
      text-align: left;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
      white-space: nowrap;
    }

    .table-wrap th {
      background: #f8fafc;
      font-weight: 700;
      color: var(--text);
    }

    .table-wrap tr:last-child td {
      border-bottom: none;
    }

    .table-wrap tr:nth-child(even) td {
      background: #fcfcfd;
    }

    .composer-shell {
      padding: 0 20px 24px;
      background: linear-gradient(to top, #ffffff 60%, rgba(255, 255, 255, 0));
    }

    .composer-wrap {
      width: min(920px, 100%);
      margin: 0 auto;
    }

    .composer {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 26px;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .composer-top {
      display: flex;
      align-items: flex-end;
      gap: 12px;
    }

    .composer textarea {
      flex: 1;
      border: none;
      outline: none;
      resize: none;
      min-height: 28px;
      max-height: 420px;
      padding: 8px 6px;
      font: inherit;
      font-size: 15px;
      color: var(--text);
      background: transparent;
      overflow: hidden;
      line-height: 1.7;
    }

    .composer textarea::placeholder {
      color: #9ca3af;
    }

    .composer textarea:disabled {
      color: #9ca3af;
      cursor: not-allowed;
    }

    .send-btn {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background: var(--primary);
      color: white;
      font-size: 18px;
      flex-shrink: 0;
    }

    .send-btn.stop-state {
      background: #ef4444;
    }

    .send-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .composer-bottom {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 10px;
      padding: 0 6px;
      color: var(--muted);
      font-size: 12px;
      flex-wrap: wrap;
    }

    .typing {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
    }

    .typing i {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #9ca3af;
      display: inline-block;
      animation: blink 1s infinite ease-in-out;
    }

    .typing i:nth-child(2) {
      animation-delay: 0.15s;
    }

    .typing i:nth-child(3) {
      animation-delay: 0.3s;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(6px);
      z-index: 1000;
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal-dialog {
      width: min(420px, 100%);
      padding: 22px;
      border-radius: 22px;
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: 0 22px 70px rgba(15, 23, 42, 0.18);
    }

    .modal-dialog h3 {
      margin: 0 0 10px;
      font-size: 20px;
    }

    .modal-dialog p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }

    .modal-btn {
      padding: 11px 16px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      cursor: pointer;
      font: inherit;
      font-weight: 600;
    }

    .modal-btn-danger {
      border-color: #fecdd3;
      background: #ef4444;
      color: #fff;
    }

    @keyframes blink {
      0%, 80%, 100% {
        opacity: 0.35;
        transform: translateY(0);
      }
      40% {
        opacity: 1;
        transform: translateY(-2px);
      }
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }

      .topbar,
      .chat-scroll,
      .composer-shell {
        padding-left: 14px;
        padding-right: 14px;
      }

      .welcome-hero {
        gap: 14px;
      }

      .welcome h3 {
        font-size: 24px;
      }

      .welcome-bubble {
        padding: 16px 18px;
      }

      .welcome-gif {
        width: clamp(82px, 24vw, 118px);
      }

      .status-pill {
        display: none;
      }

      .bubble.user {
        max-width: 84%;
      }

      .chart-preview {
        padding: 14px 14px 10px;
      }

      .chart-preview-canvas {
        min-height: 250px;
      }

      .chart-preview-canvas canvas {
        height: 250px !important;
      }

      .table-wrap table {
        min-width: 480px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">AI</div>
        <div>
          <h1>TEMI</h1>
          <p>Teman Reportmu</p>
        </div>
      </div>

      <button class="new-chat" id="newChatBtn">+ Percakapan Baru</button>

      <div class="section-title">Riwayat Percakapan</div>
      <div class="history" id="historyList"></div>

      <div class="sidebar-footer">
        <p>TEMA@2026</p>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h2>Asisten AI</h2>
          <p>Pendamping cerdas Anda untuk Aplikasi TEMA</p>
        </div>
      </header>

      <section class="chat-scroll" id="chatScroll">
        <div class="chat-wrap" id="chatWrap">
          <div class="welcome">
            <div class="welcome-hero">
              <img class="welcome-gif" src="./temi.gif" alt="TEMI menyapa" />
              <div class="welcome-copy">
                <div class="welcome-bubble">
                  <h3>Halo, ada yang bisa <span class="text-primary">TEMI</span> bantu?</h3>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="composer-shell">
        <div class="composer-wrap">
          <div class="composer">
            <div class="composer-top">
              <textarea id="messageInput" placeholder="Tulis pesan Anda di sini..." rows="1"></textarea>
              <button class="send-btn" id="sendBtn" type="button">➤</button>
            </div>
            <div class="composer-bottom">
              <span>Enter untuk kirim • Shift + Enter untuk baris baru</span>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="modal-backdrop" id="deleteModal" aria-hidden="true">
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="deleteModalTitle">
      <h3 id="deleteModalTitle">Hapus riwayat percakapan?</h3>
      <p id="deleteModalText">Percakapan yang dihapus tidak bisa dikembalikan.</p>
      <div class="modal-actions">
        <button class="modal-btn" id="cancelDeleteBtn" type="button">Batal</button>
        <button class="modal-btn modal-btn-danger" id="confirmDeleteBtn" type="button">Hapus</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const CHAT_STORAGE_BASE_KEY = "temi_chat_history";
    const LEGACY_CHAT_STORAGE_KEY = CHAT_STORAGE_BASE_KEY;
    const DEVICE_STORAGE_KEY = "temi_device_id";
    const DEVICE_ID = getOrCreateDeviceId();
    const CHAT_STORAGE_KEY = `${CHAT_STORAGE_BASE_KEY}:${DEVICE_ID}`;
    const API_URL = "https://oman-dev.app.n8n.cloud/webhook/4c572449-1b90-442b-8120-22298962883a/chat"; // ganti ke webhook n8n Anda

    const historyList = document.getElementById("historyList");
    const chatWrap = document.getElementById("chatWrap");
    const chatScroll = document.getElementById("chatScroll");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const newChatBtn = document.getElementById("newChatBtn");
    const deleteModal = document.getElementById("deleteModal");
    const deleteModalText = document.getElementById("deleteModalText");
    const cancelDeleteBtn = document.getElementById("cancelDeleteBtn");
    const confirmDeleteBtn = document.getElementById("confirmDeleteBtn");

    let currentMessages = [];
    let currentTitle = "Percakapan baru";
    let isLoading = false;
    let sessionId = generateSessionId();
    let pendingDeleteChatId = null;
    let activeRequestController = null;

    function autoResizeTextarea() {
      messageInput.style.height = "auto";
      messageInput.style.height = Math.min(messageInput.scrollHeight, 420) + "px";
    }

    function setComposerLoading(loading) {
      messageInput.disabled = loading;
      sendBtn.disabled = false;
      sendBtn.classList.toggle("stop-state", loading);
      sendBtn.textContent = loading ? "■" : "➤";
      sendBtn.title = loading ? "Stop response" : "Kirim pesan";
    }

    function stopActiveRequest() {
      if (!isLoading || !activeRequestController) {
        return;
      }

      activeRequestController.abort();
      removeTyping();
    }

    function smoothScrollToBottom() {
      requestAnimationFrame(() => {
        chatScroll.scrollTo({
          top: chatScroll.scrollHeight,
          behavior: "smooth"
        });
      });
    }

    function generateSessionId() {
      return "sess-" + Date.now() + "-" + Math.random().toString(36).slice(2, 10);
    }

    function getOrCreateDeviceId() {
      const existingDeviceId = localStorage.getItem(DEVICE_STORAGE_KEY);
      if (existingDeviceId) {
        return existingDeviceId;
      }

      const newDeviceId =
        typeof crypto !== "undefined" && typeof crypto.randomUUID === "function"
          ? crypto.randomUUID()
          : "dev-" + Date.now() + "-" + Math.random().toString(36).slice(2, 10);

      localStorage.setItem(DEVICE_STORAGE_KEY, newDeviceId);
      return newDeviceId;
    }

    function getStoredChats() {
      const scopedChats = JSON.parse(localStorage.getItem(CHAT_STORAGE_KEY) || "null");
      if (Array.isArray(scopedChats)) {
        return scopedChats;
      }

      const legacyChats = JSON.parse(localStorage.getItem(LEGACY_CHAT_STORAGE_KEY) || "[]");
      if (Array.isArray(legacyChats) && legacyChats.length) {
        localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify(legacyChats));
        return legacyChats;
      }

      return [];
    }

    function setStoredChats(chats) {
      localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify(chats));
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function extractBalancedBlock(text, startIndex, openChar, closeChar) {
      let depth = 0;
      let inString = false;
      let quoteChar = "";
      let escaped = false;

      for (let index = startIndex; index < text.length; index += 1) {
        const char = text[index];

        if (inString) {
          if (escaped) {
            escaped = false;
            continue;
          }

          if (char === "\\") {
            escaped = true;
            continue;
          }

          if (char === quoteChar) {
            inString = false;
          }
          continue;
        }

        if (char === "\"" || char === "'") {
          inString = true;
          quoteChar = char;
          continue;
        }

        if (char === openChar) {
          depth += 1;
        } else if (char === closeChar) {
          depth -= 1;
          if (depth === 0) {
            return text.slice(startIndex, index + 1);
          }
        }
      }

      return null;
    }

    function extractPropertyArray(text, propertyName) {
      const propertyIndex = text.search(new RegExp(`${propertyName}\\s*:`));
      if (propertyIndex === -1) {
        return null;
      }

      const arrayStart = text.indexOf("[", propertyIndex);
      if (arrayStart === -1) {
        return null;
      }

      return extractBalancedBlock(text, arrayStart, "[", "]");
    }

    function extractPropertyObject(text, propertyName) {
      const propertyIndex = text.search(new RegExp(`${propertyName}\\s*:`));
      if (propertyIndex === -1) {
        return null;
      }

      const objectStart = text.indexOf("{", propertyIndex);
      if (objectStart === -1) {
        return null;
      }

      return extractBalancedBlock(text, objectStart, "{", "}");
    }

    function extractPropertyLiteral(text, propertyName) {
      const propertyIndex = text.search(new RegExp(`${propertyName}\\s*:`));
      if (propertyIndex === -1) {
        return null;
      }

      const valueStart = text.slice(propertyIndex).match(/:\s*/);
      if (!valueStart) {
        return null;
      }

      const startIndex = propertyIndex + valueStart[0].length;
      const firstChar = text[startIndex];

      if (firstChar === "[") {
        return extractBalancedBlock(text, startIndex, "[", "]");
      }

      if (firstChar === "{") {
        return extractBalancedBlock(text, startIndex, "{", "}");
      }

      if (firstChar === "'" || firstChar === "\"") {
        let index = startIndex + 1;
        let escaped = false;

        while (index < text.length) {
          const char = text[index];
          if (escaped) {
            escaped = false;
          } else if (char === "\\") {
            escaped = true;
          } else if (char === firstChar) {
            return text.slice(startIndex, index + 1);
          }
          index += 1;
        }
      }

      const match = text.slice(startIndex).match(/^[^,\n}]+/);
      return match ? match[0].trim() : null;
    }

    function splitTopLevelObjects(text) {
      const blocks = [];
      let index = 0;

      while (index < text.length) {
        const start = text.indexOf("{", index);
        if (start === -1) break;

        const block = extractBalancedBlock(text, start, "{", "}");
        if (!block) break;

        blocks.push(block);
        index = start + block.length;
      }

      return blocks;
    }

    function parseLooseValue(value) {
      const normalized = value
        .replace(/'/g, "\"")
        .replace(/,\s*([}\]])/g, "$1")
        .trim();

      try {
        return JSON.parse(normalized);
      } catch (error) {
        return null;
      }
    }

    function parseDatasetBlock(datasetBlock) {
      const labelMatch = datasetBlock.match(/label\s*:\s*['"]([^'"]+)['"]/i);
      const dataBlock = extractPropertyArray(datasetBlock, "data");

      if (!dataBlock) {
        return null;
      }

      const dataset = {
        label: labelMatch ? labelMatch[1] : "Data",
        data: parseLooseValue(dataBlock)
      };

      if (!Array.isArray(dataset.data)) {
        return null;
      }

      const backgroundBlock = extractPropertyLiteral(datasetBlock, "backgroundColor");
      const borderBlock = extractPropertyLiteral(datasetBlock, "borderColor");

      if (backgroundBlock) {
        dataset.backgroundColor = parseLooseValue(backgroundBlock);
      }

      if (borderBlock) {
        dataset.borderColor = parseLooseValue(borderBlock);
      }

      dataset.borderWidth = 1;
      return dataset;
    }

    function parseChartConfig(configBlock) {
      const typeMatch = configBlock.match(/type\s*:\s*['"]([^'"]+)['"]/i);
      const dataBlock = extractPropertyObject(configBlock, "data");

      if (!typeMatch || !dataBlock) {
        return null;
      }

      const labelsBlock = extractPropertyArray(dataBlock, "labels");
      const datasetsBlock = extractPropertyArray(dataBlock, "datasets");
      if (!labelsBlock || !datasetsBlock) {
        return null;
      }

      const labels = parseLooseValue(labelsBlock);
      const datasetBlocks = splitTopLevelObjects(datasetsBlock.slice(1, -1));

      if (!Array.isArray(labels) || !datasetBlocks.length) {
        return null;
      }

      const datasets = datasetBlocks.map(parseDatasetBlock).filter(Boolean);
      if (!datasets.length) {
        return null;
      }

      return {
        type: typeMatch[1].toLowerCase(),
        labels,
        datasets
      };
    }

    function normalizeChartSource(sourceText) {
      return sourceText
        .replace(/^```(?:html|javascript|js)?\s*/i, "")
        .replace(/```$/i, "")
        .replace(/^html\s*\n/i, "")
        .replace(/^javascript\s*\n/i, "")
        .replace(/^js\s*\n/i, "")
        .trim();
    }

    function extractChartConfigs(sourceText) {
      const normalizedSource = normalizeChartSource(sourceText);
      const configs = [];
      let searchIndex = 0;

      while (searchIndex < normalizedSource.length) {
        const chartIndex = normalizedSource.indexOf("new Chart", searchIndex);
        if (chartIndex === -1) break;

        const configStart = normalizedSource.indexOf("{", chartIndex);
        if (configStart === -1) break;

        const configBlock = extractBalancedBlock(normalizedSource, configStart, "{", "}");
        if (!configBlock) break;

        const config = parseChartConfig(configBlock);
        if (config) {
          configs.push(config);
        }

        searchIndex = configStart + configBlock.length;
      }

      return configs;
    }

    function createChartPreview(config, index) {
      const wrapper = document.createElement("div");
      wrapper.className = "chart-preview";

      const header = document.createElement("div");
      header.className = "chart-preview-head";
      header.innerHTML = `
        <div class="chart-preview-title">Visualisasi data</div>
        <div class="chart-preview-kind">${escapeHtml(config.type)}</div>
      `;

      const canvasWrap = document.createElement("div");
      canvasWrap.className = "chart-preview-canvas";

      const canvas = document.createElement("canvas");
      canvas.id = `chart-preview-${Date.now()}-${index}`;

      canvasWrap.appendChild(canvas);
      wrapper.appendChild(header);
      wrapper.appendChild(canvasWrap);

      requestAnimationFrame(() => {
        new Chart(canvas.getContext("2d"), {
          type: config.type,
          data: {
            labels: config.labels,
            datasets: config.datasets
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                labels: {
                  color: "#151515"
                }
              }
            },
            scales: ["bar", "line"].includes(config.type)
              ? {
                  x: {
                    ticks: {
                      color: "#6b7280"
                    },
                    grid: {
                      color: "rgba(107, 114, 128, 0.12)"
                    }
                  },
                  y: {
                    beginAtZero: true,
                    ticks: {
                      color: "#6b7280"
                    },
                    grid: {
                      color: "rgba(107, 114, 128, 0.12)"
                    }
                  }
                }
              : {}
          }
        });
      });

      return wrapper;
    }

    function renderChartBlocks(container, sourceText) {
      if (typeof Chart === "undefined") {
        return;
      }

      const codeBlocks = Array.from(container.querySelectorAll("pre"));
      const candidateBlocks = codeBlocks.filter(block => block.textContent.includes("new Chart"));

      if (candidateBlocks.length) {
        candidateBlocks.forEach((block, index) => {
          const localConfigs = extractChartConfigs(block.textContent);
          const fallbackConfig = extractChartConfigs(sourceText)[index];
          const config = localConfigs[0] || fallbackConfig;
          if (!config) {
            return;
          }
          block.replaceWith(createChartPreview(config, index));
        });
        return;
      }

      const chartConfigs = extractChartConfigs(sourceText);
      if (!chartConfigs.length) {
        return;
      }

      chartConfigs.forEach((config, index) => {
        container.appendChild(createChartPreview(config, index));
      });
    }

    function renderSimpleMarkdown(text) {
      let html = escapeHtml(text);

      html = html.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      html = html.replace(/^### (.*)$/gm, '<p><strong>$1</strong></p>');
      html = html.replace(/^## (.*)$/gm, '<p><strong>$1</strong></p>');
      html = html.replace(/^# (.*)$/gm, '<p><strong>$1</strong></p>');
      html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\[(.*?)\]\((https?:\/\/[^\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');

      html = html.replace(/(?:^|\n)(- .+(?:\n- .+)*)/g, (match, block) => {
        const items = block
          .trim()
          .split(/\n/)
          .map(line => `<li>${line.replace(/^- /, "")}</li>`)
          .join("");
        return `\n<ul>${items}</ul>`;
      });

      html = html.replace(
        /(?:^|\n)((?:\|.*\|\n)+\|(?:\s*:?-{3,}:?\s*\|)+\n(?:\|.*\|\n?)*)/g,
        (match, tableBlock) => renderMarkdownTable(tableBlock)
      );

      const parts = html.split(/\n\n+/).map(part => {
        const trimmed = part.trim();
        if (!trimmed) return "";
        if (/^<(pre|ul|ol|p|div|table)/.test(trimmed)) return trimmed;
        return `<p>${trimmed.replace(/\n/g, "<br>")}</p>`;
      });

      return parts.filter(Boolean).join("");
    }

    function renderMarkdownTable(tableBlock) {
      const lines = tableBlock
        .trim()
        .split("\n")
        .map(line => line.trim())
        .filter(Boolean);

      if (lines.length < 3) {
        return tableBlock;
      }

      const headerLine = lines[0];
      const dividerLine = lines[1];
      const bodyLines = lines.slice(2);

      if (!/\|/.test(headerLine) || !/^\|?(?:\s*:?-{3,}:?\s*\|)+\s*$/.test(dividerLine)) {
        return tableBlock;
      }

      const parseRow = (line) =>
        line
          .replace(/^\|/, "")
          .replace(/\|$/, "")
          .split("|")
          .map(cell => cell.trim());

      const headers = parseRow(headerLine);
      const rows = bodyLines.map(parseRow).filter(row => row.length);

      const headerHtml = headers.map(cell => `<th>${cell}</th>`).join("");
      const bodyHtml = rows
        .map(row => `<tr>${row.map(cell => `<td>${cell}</td>`).join("")}</tr>`)
        .join("");

      return `<div class="table-wrap"><table><thead><tr>${headerHtml}</tr></thead><tbody>${bodyHtml}</tbody></table></div>`;
    }

    function enhanceTables(container) {
      const tables = Array.from(container.querySelectorAll("table"));
      tables.forEach((table) => {
        if (table.parentElement && table.parentElement.classList.contains("table-wrap")) {
          return;
        }

        const wrapper = document.createElement("div");
        wrapper.className = "table-wrap";
        table.parentNode.insertBefore(wrapper, table);
        wrapper.appendChild(table);
      });
    }

    function syncWelcomeState() {
      const existingWelcome = chatWrap.querySelector(".welcome");

      if (currentMessages.length === 0) {
        if (!existingWelcome) {
          chatWrap.innerHTML = `
            <div class="welcome">
              <div class="welcome-hero">
                <img class="welcome-gif" src="./temi.gif" alt="TEMI menyapa" />
                <div class="welcome-copy">
                  <div class="welcome-bubble">
                    <h3>Halo, ada yang bisa <span class="text-primary">TEMI</span> bantu?</h3>
                  </div>
                </div>
              </div>
            </div>
          `;
        }
        return;
      }

      if (existingWelcome) {
        existingWelcome.remove();
      }
    }

    function addMessage(role, text, save = true) {
      if (save) {
        currentMessages.push({ role, text });
      }

      syncWelcomeState();

      const row = document.createElement("div");
      row.className = `message-row ${role === "user" ? "user-row" : "assistant-row"}`;

      const bubble = document.createElement("div");
      bubble.className = `bubble ${role}`;

      const actionHtml = role === "assistant"
        ? '<div class="actions"><button class="copy-btn" type="button">Copy</button></div>'
        : "";

      bubble.innerHTML = `
        <div class="text">${role === "assistant" ? renderSimpleMarkdown(text) : escapeHtml(text).replace(/\n/g, "<br>")}</div>
        ${actionHtml}
      `;

      if (role === "assistant") {
        renderChartBlocks(bubble.querySelector(".text"), text);
        enhanceTables(bubble.querySelector(".text"));
      }

      row.appendChild(bubble);
      chatWrap.appendChild(row);

      const copyBtn = bubble.querySelector(".copy-btn");
      if (copyBtn) {
        copyBtn.addEventListener("click", async () => {
          try {
            await navigator.clipboard.writeText(text);
            const original = copyBtn.textContent;
            copyBtn.textContent = "Copied";
            setTimeout(() => {
              copyBtn.textContent = original;
            }, 1200);
          } catch (error) {
            copyBtn.textContent = "Gagal copy";
            setTimeout(() => {
              copyBtn.textContent = "Copy";
            }, 1200);
          }
        });
      }

      smoothScrollToBottom();

      if (save) {
        saveChat();
      }
    }

    function addTyping() {
      const row = document.createElement("div");
      row.className = "message-row assistant-row";
      row.id = "typingRow";
      row.innerHTML = `
        <div class="bubble assistant">
          <div class="text"><span class="typing"><i></i><i></i><i></i></span></div>
        </div>
      `;
      chatWrap.appendChild(row);
      smoothScrollToBottom();
    }

    function removeTyping() {
      const el = document.getElementById("typingRow");
      if (el) el.remove();
    }

    function saveChat() {
      const allChats = getStoredChats();
      const payload = {
        id: sessionId,
        sessionId,
        title: currentTitle,
        preview: currentMessages[currentMessages.length - 1]?.text || "Belum ada pesan",
        updatedAt: new Date().toISOString(),
        messages: currentMessages
      };

      const filtered = allChats.filter(item => item.id !== payload.id);
      filtered.unshift(payload);
      setStoredChats(filtered.slice(0, 12));
      renderHistory();
    }

    function openDeleteModal(chat) {
      pendingDeleteChatId = chat.id;
      deleteModalText.textContent = `Percakapan "${chat.title || "Percakapan baru"}" akan dihapus permanen.`;
      deleteModal.classList.add("show");
      deleteModal.setAttribute("aria-hidden", "false");
    }

    function closeDeleteModal() {
      pendingDeleteChatId = null;
      deleteModal.classList.remove("show");
      deleteModal.setAttribute("aria-hidden", "true");
    }

    function deleteChat(chatId) {
      const allChats = getStoredChats();
      const remainingChats = allChats.filter(chat => chat.id !== chatId);
      setStoredChats(remainingChats);

      if (sessionId === chatId) {
        if (remainingChats.length) {
          loadChat(remainingChats[0]);
        } else {
          currentMessages = [];
          currentTitle = "Percakapan baru";
          sessionId = generateSessionId();
          chatWrap.innerHTML = "";
          syncWelcomeState();
          renderHistory();
        }
      } else {
        renderHistory();
      }

      messageInput.focus();
    }

    function renderHistory() {
      const allChats = getStoredChats();
      historyList.innerHTML = "";

      if (!allChats.length) {
        historyList.innerHTML = '<div class="history-item history-empty active"><strong>Belum ada percakapan</strong><span>Mulai percakapan baru</span></div>';
        return;
      }

      allChats.forEach((chat, index) => {
        const item = document.createElement("div");
        item.className = `history-item ${chat.id === sessionId || (index === 0 && !allChats.some(x => x.id === sessionId)) ? "active" : ""}`;
        item.innerHTML = `
          <button class="history-item-main" type="button">
            <strong>${escapeHtml(chat.title || "Percakapan baru")}</strong>
            <span>${escapeHtml(chat.preview || "Belum ada pesan")}</span>
          </button>
          <button class="history-delete" type="button" aria-label="Hapus percakapan">×</button>
        `;

        item.querySelector(".history-item-main").addEventListener("click", () => loadChat(chat));
        item.querySelector(".history-delete").addEventListener("click", (event) => {
          event.stopPropagation();
          openDeleteModal(chat);
        });

        historyList.appendChild(item);
      });
    }

    function loadChat(chat) {
      currentTitle = chat.title || "Percakapan baru";
      sessionId = chat.sessionId || chat.id || generateSessionId();
      currentMessages = chat.messages || [];
      resetChatView(false);
      currentMessages.forEach(msg => addMessage(msg.role, msg.text, false));
      renderHistory();
    }

    function resetChatView(resetMessages = true) {
      if (resetMessages) {
        currentMessages = [];
        currentTitle = "Percakapan baru";
        sessionId = generateSessionId();
        saveChat();
      }

      chatWrap.innerHTML = "";
      syncWelcomeState();

      smoothScrollToBottom();
    }

    async function sendMessage() {
      if (isLoading) return;

      const text = messageInput.value.trim();
      if (!text) return;

      addMessage("user", text);

      if (currentMessages.length === 1) {
        currentTitle = text.slice(0, 35) + (text.length > 35 ? "..." : "");
        saveChat();
      }

      messageInput.value = "";
      autoResizeTextarea();

      isLoading = true;
      setComposerLoading(true);
      addTyping();

      try {
        const body = { chatInput: text, sessionId };
        activeRequestController = new AbortController();

        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
          signal: activeRequestController.signal
        });

        const data = await res.json().catch(() => ({}));
        removeTyping();

        const reply =
          data.output ??
          data.reply ??
          data.message ??
          data.text ??
          "Request berhasil dikirim ke n8n, tetapi respons tidak memiliki field output/reply/message/text.";

        addMessage("assistant", String(reply));
      } catch (error) {
        removeTyping();
        if (error.name === "AbortError") {
          return;
        }
        addMessage("assistant", `Gagal menghubungi API n8n. Detail: ${error.message}`);
      } finally {
        isLoading = false;
        activeRequestController = null;
        setComposerLoading(false);
        messageInput.focus();
      }
    }

    newChatBtn.addEventListener("click", () => {
      resetChatView(true);
    });

    cancelDeleteBtn.addEventListener("click", closeDeleteModal);
    confirmDeleteBtn.addEventListener("click", () => {
      if (!pendingDeleteChatId) return;
      const chatId = pendingDeleteChatId;
      closeDeleteModal();
      deleteChat(chatId);
    });

    deleteModal.addEventListener("click", (event) => {
      if (event.target === deleteModal) {
        closeDeleteModal();
      }
    });

    sendBtn.addEventListener("click", () => {
      if (isLoading) {
        stopActiveRequest();
        return;
      }

      sendMessage();
    });

    messageInput.addEventListener("input", autoResizeTextarea);

    messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }

      if (e.key === "Escape" && isLoading) {
        stopActiveRequest();
      }

      if (e.key === "Escape" && deleteModal.classList.contains("show")) {
        closeDeleteModal();
      }
    });

    setComposerLoading(false);
    renderHistory();
    autoResizeTextarea();
    smoothScrollToBottom();
  </script>
</body>
</html>
